name: Build and Release Aetlantiq OS

# This workflow only runs when you push a Git tag that starts with 'v'
on:
  push:
    tags:
      - 'v*'

# GitHub Actions requires read/write permissions to create the release
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # The matrix tells GitHub to run this job three times simultaneously
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # Linux requires a few extra graphical libraries to compile Electron apps
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libopenjp2-7-dev libicu-dev

      - name: Build Application
        run: npm run build

      # This step grabs the compiled .exe, .dmg, or .AppImage and attaches them to the Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Look inside the dist folder for the packaged executables
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build and Release Aetlantiq OS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libopenjp2-7-dev libicu-dev

      # FIX: Run the specific packaging scripts for each operating system
      - name: Build & Package Windows
        if: matrix.os == 'windows-latest'
        run: npm run build:win

      - name: Build & Package Mac
        if: matrix.os == 'macos-latest'
        run: npm run build:mac

      - name: Build & Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux

      # Upload the newly created executables
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}